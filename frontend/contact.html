<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoRide — Contact</title>
    <link rel="stylesheet" href="css/style.css" />

    <style>
      .page-contact {
        padding-top: 100px;
        min-height: 100vh;
        background: var(--gris-fond);
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .contact-container {
        width: 100%;
        max-width: 600px;
        background: white;
        border-radius: var(--radius);
        box-shadow: var(--ombre);
        padding: 40px;
      }

      .contact-container h1 {
        font-family: var(--font-titre);
        font-size: 1.8rem;
        margin-bottom: 20px;
      }

      .champ-groupe {
        display: flex;
        flex-direction: column;
        margin-bottom: 16px;
      }

      .champ-groupe label {
        font-size: 0.8rem;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--gris-texte);
      }

      .champ-groupe input,
      .champ-groupe textarea {
        padding: 12px;
        border-radius: var(--radius-petit);
        border: 1px solid var(--gris-bordure);
        font-family: var(--font-corps);
        outline: none;
      }

      .champ-groupe textarea {
        resize: none;
      }

      .btn {
        margin-top: 10px;
      }

      .msg {
        margin-top: 15px;
        font-size: 0.9rem;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <a href="index.html" class="logo">EcoRide</a>

      <ul class="nav-links">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="covoiturages.html">Covoiturages</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>

      <div class="nav-actions">
        <a href="profil.html" class="btn btn-vert">Mon espace</a>
      </div>
    </nav>

    <!-- PAGE -->
    <div class="page-contact">
      <div class="contact-container">
        <h1>Contact</h1>

        <div class="champ-groupe">
          <label>Nom</label>
          <input type="text" id="nom" placeholder="Ton nom" />
        </div>

        <div class="champ-groupe">
          <label>Email</label>
          <input type="email" id="email" placeholder="ton@email.com" />
        </div>

        <div class="champ-groupe">
          <label>Message</label>
          <textarea
            id="message"
            rows="5"
            placeholder="Explique ton problème..."
          ></textarea>
        </div>

        <button class="btn btn-vert" onclick="envoyerMessage()">Envoyer</button>

        <div id="msg-contact" class="msg"></div>
      </div>
    </div>

    <script>
      function envoyerMessage() {
        const nom = document.getElementById("nom").value;
        const email = document.getElementById("email").value;
        const message = document.getElementById("message").value;

        if (!nom || !email || !message) {
          document.getElementById("msg-contact").innerHTML =
            '<span style="color:red">Tous les champs sont obligatoires</span>';
          return;
        }

        // Ici tu peux plus tard connecter une API
        document.getElementById("msg-contact").innerHTML =
          '<span style="color:green">Message envoyé (simulation)</span>';

        // reset
        document.getElementById("nom").value = "";
        document.getElementById("email").value = "";
        document.getElementById("message").value = "";
      }
    </script>
  </body>
</html>
